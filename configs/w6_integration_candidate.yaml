experiment_id: w6_int_01_candidate_semantic_bge_m3
name: W6 integration candidate - semantic BGE-M3 chunking
branch: gemini-call
domain: TUVI
source_ids:
  - TVKL
  - TVNL
  - TVHS
  - TVGM
# W6-ABL-03 quality candidate. This file is intentionally separate from
# default_production.yaml because W7-CONFIG-01 is responsible for locking the
# final production config.
chunk_strategy_id: chunk_semantic_embedding_bge_m3
accepted_chunk_strategy_ids:
  - chunk_fixed_512
  - chunk_structure_parent_child
  - chunk_semantic_embedding_bge_m3
embedding:
  slot: bge_m3
  model: BAAI/bge-m3
  vector_index: chunkVectorBgeM3
  dimension: 1024
query_rewrite_enabled: false
query_rewrite:
  backend: gemini
  model: gemini-3.1-flash-lite-preview
  temperature: 0.0
  max_output_tokens: 256
  fallback_on_error: true
entity_extraction_enabled: true
runtime_entity_extraction:
  backend: dictionary
  model: dictionary-rule
  entity_config_path: configs/entity_extraction.yaml
  max_entities: 16
  exclude_entity_types:
    - LuanGiai
graph_retrieval_enabled: true
graph_retrieval:
  top_k: 8
  per_entity_limit: 5
  allowed_relation_types:
    - MENTIONS
    - GIAI_THICH
    - RELATED_TO
    - THUOC_CUNG
    - DOI_CHIEU
    - LIEN_KE
    - APPLIES_TO
    - LUU_Y
  timeout_seconds: 3.0
  child_only: true
# Keep dense off for W6-INT-01 so this integration test validates the same
# Graph + Sparse + RRF + reranker stack used by W6-ABL-03 chunking comparison.
dense_retrieval_enabled: false
dense_retrieval:
  top_k: 8
  candidate_k: 500
  vector_index: chunkVectorBgeM3
  embedding_slot: bge_m3
  timeout_seconds: 3.0
  child_only: true
sparse_retrieval_enabled: true
sparse_retrieval:
  top_k: 8
  fulltext_index: chunkFulltext
  sanitization_mode: or_terms
  timeout_seconds: 3.0
  child_only: true
fusion_method: rrf
fusion_path_weights:
  graph: 1.45
  dense: 1.15
  sparse: 0.80
reranker_config:
  enabled: true
  model: BAAI/bge-reranker-v2-m3
  top_k: 10
  batch_size: 2
  max_length: 512
  local_files_only: true
  local_model_path: models/bge-reranker-v2-m3
document_grading_enabled: true
prompt_template_id: tuvi_generation_v1
generation_model: gemini-3.1-flash-lite-preview
context_assembly_strategy: balanced
cache_disabled: true
