name: w6_abl_02_retrieval_fusion_reranker_v1
notes: "W6-ABL-02 retrieval/fusion/reranker ablation v1. Official metrics require --judge-backend gemini; use --offline-smoke --limit 2 only for local plumbing checks. Dense variants use configs/w6_planner_gated_dense.yaml so Direct chart QA still skips dense by planner gate."
dataset_path: benchmark/tuvi_golden_dataset/release/tuviqa_v1_release.jsonl
output_dir: benchmark/tuvi_golden_dataset/reports/w6_abl_02
configs:
  - name: baseline_graph_sparse_rrf
    base_config_path: configs/default_production.yaml
    overrides:
      experiment_id: w6_abl_02_baseline_graph_sparse_rrf
      name: W6 ABL 02 - baseline graph+sparse RRF
      cache_disabled: true
      graph_retrieval_enabled: true
      dense_retrieval_enabled: false
      sparse_retrieval_enabled: true
      fusion_method: rrf
      reranker_config:
        enabled: true

  - name: graph_only_rrf
    base_config_path: configs/default_production.yaml
    overrides:
      experiment_id: w6_abl_02_graph_only_rrf
